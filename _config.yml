title: Working with Carl
name: Working with Carl
description: "Modern, minimal personal site"
url: https://onkeltom.github.io
baseurl: ""
permalink: /:categories/:title/
timezone: Europe/Berlin
og_image: /assets/img/og-default.svg
markdown: kramdown
collections:
  recipes:
    output: true
    permalink: /recipes/:name/
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: recipes
    values:
      layout: recipe
      is_recipe: true
