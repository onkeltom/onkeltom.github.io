---
layout: default
---
<article class="card stack" data-gap="lg" itemscope itemtype="https://schema.org/Recipe">
  <header class="stack" data-gap="sm">
    <h1 class="recipe-title" itemprop="name">{{ page.title }}</h1>
    {% if page.description %}
    <p class="meta" itemprop="description">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="prose" itemprop="recipeInstructions">
    {{ content }}
  </div>
</article>
