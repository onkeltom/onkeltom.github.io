---
layout: default
---
<article class="recipe" itemscope itemtype="https://schema.org/Recipe">
  <header class="recipe-header">
    <h1 class="recipe-title" itemprop="name">{{ page.title }}</h1>
    {% if page.description %}
    <p class="recipe-summary" itemprop="description">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="recipe-content" itemprop="recipeInstructions">
    {{ content }}
  </div>
</article>
